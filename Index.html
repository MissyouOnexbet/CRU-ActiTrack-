<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU ActiTrack - ระบบบันทึกชั่วโมงกิจกรรม</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CRU ActiTrack</h1>
        <p>บันทึกชั่วโมงกิจกรรมนักศึกษา</p>

        <form id="activityForm">
            <div class="form-control">
                <label for="activityName">ชื่อกิจกรรม:</label>
                <input type="text" id="activityName" placeholder="เช่น กิจกรรมจิตอาสา..." required>
            </div>
            <div class="form-control">
                <label for="activityDate">วันที่ทำกิจกรรม:</label>
                <input type="date" id="activityDate" required>
            </div>
            <div class="form-control">
                <label for="activityHours">จำนวนชั่วโมงที่ได้รับ:</label>
                <input type="number" id="activityHours" min="1" required>
            </div>
            <button type="submit">บันทึกข้อมูล</button>
        </form>

        <div class="list-section">
            <h2>ประวัติการเข้าร่วมกิจกรรม</h2>
            <ul id="activityList">
                </ul>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
